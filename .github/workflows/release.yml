name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - name: macOS Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
          - name: Windows x64
            os: windows-latest
            rust_target: ''
            args: --bundles nsis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate updater configuration
        shell: bash
        run: |
          python <<'PY'
          import json
          import sys
          from pathlib import Path

          data = json.loads(Path('tauri.conf.json').read_text(encoding='utf-8'))
          updater = data.get('plugins', {}).get('updater', {})
          pubkey = updater.get('pubkey', '')
          endpoints = updater.get('endpoints', [])
          errors = []

          if not pubkey or 'REPLACE_WITH_TAURI_UPDATER_PUBLIC_KEY' in pubkey:
              errors.append('tauri.conf.json 中的 plugins.updater.pubkey 仍是占位值。')
          if not endpoints:
              errors.append('tauri.conf.json 中缺少 plugins.updater.endpoints。')
          elif any('github.com/OWNER/REPO' in endpoint for endpoint in endpoints):
              errors.append('tauri.conf.json 中的 updater endpoint 仍包含 OWNER/REPO 占位值。')

          if errors:
              for item in errors:
                  print(f'::error::{item}')
              sys.exit(1)
          PY

      - name: Validate updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo '::error::Missing repository secret TAURI_SIGNING_PRIVATE_KEY'
            exit 1
          fi

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo '::error::Missing repository secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD'
            echo '::error::Use a password-protected updater key and save the password in GitHub Secrets.'
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install extra Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Transfer Genie v__VERSION__
          releaseBody: |
            Automated GitHub Release for Transfer Genie.

            ## macOS 用户注意

            如果打开应用提示"已损坏"，请打开 DMG 中的 `fix-quarantine.sh` 脚本修复。
            详细说明请查看 DMG 中的 `README.md` 文件。

            ### 快速修复命令
            ```bash
            cd /Volumes/Transfer\ Genie
            ./fix-quarantine.sh
            ```

            ---

            - Includes platform bundles and updater artifacts.
            - `latest.json` is uploaded for the desktop auto-update flow.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          includeDebug: false
          args: ${{ matrix.args }}

      - name: Enhance macOS DMG (add fix script)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          chmod +x scripts/mac/enhance-dmg.sh
          bash scripts/mac/enhance-dmg.sh

      - name: Re-upload enhanced DMG
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: target/release/bundle/dmg/*.dmg
          tag_name: ${{ github.ref_name }}
          overwrite: true

  sync-gitee:
    name: Sync release to Gitee
    runs-on: ubuntu-latest
    needs: publish
    env:
      PYTHONUNBUFFERED: "1"
      GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Skip when Gitee token is not configured
        if: ${{ env.GITEE_ACCESS_TOKEN == '' }}
        run: echo "GITEE_ACCESS_TOKEN is not configured, skipping Gitee release sync."

      - name: Sync GitHub release assets to Gitee
        if: ${{ env.GITEE_ACCESS_TOKEN != '' }}
        run: python3 scripts/release/release_sync_gitee.py
