<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer Genie</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="tauri://tauri.js"></script>
  </head>
  <body>
    <div class="app">
      <main class="content">
        <section class="tab-panel is-active" data-tab-panel="home" id="tab-home" role="tabpanel">
          <section class="feed">
            <div class="feed-toolbar">
              <div class="feed-toolbar-left">
                <div class="endpoint-switcher">
                  <label for="active-endpoint" class="visually-hidden">当前 WebDAV</label>
                  <select id="active-endpoint" class="endpoint-select"></select>
                </div>
                <div class="status-inline">
                  <span class="status-text" id="sync-status">尚未同步</span>
                </div>
                <div id="selection-bar" class="selection-bar" hidden>
                  <button id="select-all" class="button ghost small" type="button">全选</button>
                  <button id="delete-selected" class="button small" type="button">删除</button>
                  <button id="cancel-selection" class="button ghost small" type="button">取消</button>
                </div>
              </div>
              <div class="feed-toolbar-right">
                <span id="selection-count" class="selection-count" hidden>已选中 0 项</span>
                <button id="refresh-btn" class="button ghost small refresh-button" type="button">
                  <span class="refresh-label">刷新</span>
                  <span class="refresh-spinner" aria-hidden="true"></span>
                </button>
                <button id="toggle-selection" class="button ghost small" type="button">选择</button>
              </div>
            </div>
            <ul id="message-list" class="message-list"></ul>
            <button id="scroll-to-bottom" class="scroll-to-bottom" type="button" hidden>
              回到底部
            </button>
            <section class="composer">
              <label for="text-input" class="visually-hidden">发送文本</label>
              <div class="composer-row">
                <textarea id="text-input" placeholder="输入消息..."></textarea>
                <div class="composer-actions">
                  <button id="send-file" class="icon-button" type="button">
                    <img src="icons/attachment.svg" alt="附件" style="width: 16px; height: 16px;" />
                    <span>附件</span>
                  </button>
                  <button id="send-text" class="icon-button primary" type="button">
                    <img src="icons/send.svg" alt="发送" style="width: 16px; height: 16px;" />
                    <span>发送</span>
                  </button>
                </div>
              </div>
            </section>
          </section>
        </section>

        <section class="tab-panel" data-tab-panel="settings" id="tab-settings" role="tabpanel">
          <section class="settings">
            <div class="settings-header">
              <h2>设置</h2>
              <p>配置 WebDAV 连接与本地同步偏好。</p>
            </div>
            <div class="settings-body">
              <div class="endpoint-settings">
                <div class="endpoint-header">
                  <div>
                    <h3>WebDAV 端点</h3>
                    <p>可配置多个地址，并在首页切换。</p>
                  </div>
                  <div class="endpoint-header-actions">
                    <button id="batch-speed-test" class="button ghost small" type="button">
                      批量测速
                    </button>
                    <button id="add-webdav" class="button ghost small" type="button">
                      新增端点
                    </button>
                  </div>
                </div>
                <div id="webdav-list" class="endpoint-list"></div>
                <span class="field-hint">仅启用的端点可在首页选择。</span>
              </div>
              <label>
                发送者名称
                <input id="sender-name" type="text" />
              </label>
              <label>
                刷新间隔（秒）
                <input id="refresh-interval" type="number" min="1" step="1" />
              </label>
              <label>
                下载目录
                <div class="field-row">
                  <input id="download-dir" type="text" placeholder="系统默认下载目录" />
                  <button id="choose-download-dir" class="button ghost small" type="button">
                    选择
                  </button>
                </div>
                <span id="download-dir-hint" class="field-hint"></span>
              </label>
              <button id="save-settings" class="button primary">保存设置</button>
              <div class="settings-actions">
                <div class="settings-actions-row">
                  <button id="export-settings" class="button ghost" type="button">导出配置</button>
                  <button id="import-settings" class="button ghost" type="button">导入配置</button>
                </div>
                <span class="field-hint">导出文件会加密 WebDAV 凭据，导入将覆盖当前配置</span>
              </div>
              <div class="settings-actions">
                <button id="cleanup-messages" class="button ghost" type="button">清理旧数据</button>
                <span class="field-hint">可选择时间范围与清理范围（仅本地或包含 WebDAV 远端）</span>
              </div>
            </div>
          </section>
        </section>
      </main>

      <nav class="tabbar" role="tablist" aria-label="主菜单">
        <button
          class="tab-button is-active"
          type="button"
          data-tab-target="home"
          role="tab"
          aria-selected="true"
          aria-controls="tab-home"
        >
          <img src="icons/home.svg" alt="首页" class="tab-icon" />
          <span class="tab-label">首页</span>
          <span class="tab-caption">聊天</span>
        </button>
        <button
          class="tab-button"
          type="button"
          data-tab-target="settings"
          role="tab"
          aria-selected="false"
          aria-controls="tab-settings"
        >
          <img src="icons/setting.svg" alt="设置" class="tab-icon" />
          <span class="tab-label">设置</span>
          <span class="tab-caption">同步配置</span>
        </button>
      </nav>
    </div>

    <script src="main.js"></script>
  </body>
</html>
